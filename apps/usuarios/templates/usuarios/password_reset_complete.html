{% extends 'base.html' %}

{% block title %}Contraseña Restablecida - AgroSFT{% endblock %}

{% block content %}
<style>
    .msg-wrapper {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
    }
    .msg-card {
        max-width: 460px;
        width: 100%;
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        text-align: center;
    }
    .msg-card-body {
        padding: 3rem 2.5rem;
    }
    .msg-icon {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 2rem;
    }
    .msg-icon.success {
        background: #ecfdf5;
        color: #2563eb;
    }
    .msg-card-body h3 {
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 0.75rem;
    }
    .msg-card-body p {
        color: var(--text-muted);
        font-size: 0.95rem;
        line-height: 1.6;
    }
    .btn-back-login {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 12px 32px;
        border-radius: 14px;
        font-size: 0.95rem;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        transition: all 0.3s ease;
        text-decoration: none;
    }
    .btn-back-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
        color: white;
    }
</style>

<div class="msg-wrapper">
    <div class="msg-card">
        <div class="msg-card-body">
            <div class="msg-icon success">
                <i class="fas fa-shield-check"></i>
            </div>
            <h3>Contraseña Restablecida</h3>
            <p>Tu contraseña ha sido modificada correctamente. Ya puedes acceder a tu cuenta con tu nueva contraseña.</p>
            <a href="{% url 'usuarios:login' %}" class="btn-back-login">
                <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
